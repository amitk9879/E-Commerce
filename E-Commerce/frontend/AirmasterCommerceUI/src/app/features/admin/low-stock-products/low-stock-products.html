<div class="card p-3 bg-white border-0 shadow-sm mb-4 h-100 rounded-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-bold text-dark m-0">Low Stock Products</h5>
    <a href="#" class="btn btn-sm btn-outline-danger" routerLink="/admin/products">Manage Inventory</a>
  </div>
  <div class="table-responsive">
    <table class="table align-middle m-0 small">
      <thead class="table-light text-secondary">
        <tr>
          <th>Product</th>
          <th>Category</th>
          <th>Price</th>
          <th class="text-end">Stock</th>
        </tr>
      </thead>
      <tbody>
        @for (product of lowStockProducts(); track product.id) {
          <tr>
            <td class="fw-medium text-dark">{{ product.name }}</td>
            <td class="text-muted">{{ product.category }}</td>
            <td>${{ product.price | number:'1.2-2' }}</td>
            <td class="text-end">
              <span class="badge bg-danger bg-opacity-10 text-danger border border-danger-subtle px-2 py-1">
                {{ product.stockQuantity }} left
              </span>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
